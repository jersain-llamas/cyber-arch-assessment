<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Autoevaluación de arquitectura legal de ciberseguridad · ALC</title>
<style>
:root{
 --navy:#152844; --navy2:#1F3A5F; --gold:#C8A24B; --ink:#1b2530; --slate:#5a6b7b;
 --line:#dbe2ea; --bg:#eef2f6; --card:#ffffff; --soft:#f6f8fb;
 --n0:#c9ccd1; --n1:#d98c5f; --n2:#e6c14b; --n3:#7bb36b; --n4:#2f8f57;
 --alta:#cf4b57; --media:#e0a23c; --baja:#8893a0; --enley:#2f8f57;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
 color:var(--ink);background:var(--bg);font-size:15px;line-height:1.45}
h1,h2,h3{margin:0;font-weight:700;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px}

/* top bar */
header{background:var(--navy);color:#fff;border-bottom:3px solid var(--gold)}
.top{display:flex;align-items:center;gap:18px;padding:14px 20px;max-width:1180px;margin:0 auto;flex-wrap:wrap}
.brand{display:flex;flex-direction:column;gap:2px;margin-right:auto}
.brand .t{font-size:16px;font-weight:700}
.brand .s{font-size:12px;color:#b9c6d6;font-weight:500}
.acts{display:flex;gap:8px;flex-wrap:wrap}
.btn{background:transparent;color:#dce5ef;border:1px solid #3a4f6c;border:1px solid #3a4f6c;border-radius:7px;padding:7px 11px;font-size:13px;font-weight:600;transition:.15s}
.btn:hover{background:#22375a;color:#fff}
.btn.gold{background:var(--gold);color:#2a2410;border-color:var(--gold)}
.btn.gold:hover{filter:brightness(1.06)}

/* summary strip */
.summary{background:var(--navy2);color:#fff;padding:16px 0}
.summary .grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 220px;gap:14px;align-items:center}
.kpi{background:#1a3050;border:1px solid #2c456a;border-radius:10px;padding:10px 14px}
.kpi .v{font-size:26px;font-weight:800;line-height:1}
.kpi .l{font-size:11.5px;color:#b9c6d6;margin-top:4px;text-transform:uppercase;letter-spacing:.04em}
.kpi .v small{font-size:14px;font-weight:700;color:#c7d2df}
.radarbox{display:flex;flex-direction:column;align-items:center}
.radarbox svg{width:200px;height:170px}
.radarbox .cap{font-size:11px;color:#9fb0c4;margin-top:2px}

/* layout */
.main{display:grid;grid-template-columns:230px 1fr;gap:24px;padding:22px 0 60px}
.spine{position:sticky;top:14px;align-self:start}
.spine h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--slate);margin-bottom:10px}
.pnav{display:flex;flex-direction:column;gap:4px}
.pnav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:0;
 border-left:3px solid transparent;padding:8px 8px 8px 9px;border-radius:0 8px 8px 0;color:var(--ink);transition:.15s}
.pnav button:hover{background:#e6ecf3}
.pnav button.active{background:#fff;border-left-color:var(--gold);box-shadow:0 1px 3px rgba(20,40,68,.08)}
.pnav .dot{width:24px;height:24px;border-radius:6px;background:var(--navy);color:#fff;display:grid;place-items:center;
 font-weight:800;font-size:13px;flex:0 0 auto}
.pnav .pm{flex:1;min-width:0}
.pnav .pm .nm{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pnav .bar{height:5px;border-radius:3px;background:#dde4ec;margin-top:4px;overflow:hidden}
.pnav .bar i{display:block;height:100%;width:0;background:var(--n2);transition:width .3s,background .3s}
.pnav .av{font-size:12px;font-weight:800;color:var(--slate);flex:0 0 auto;width:26px;text-align:right}

/* content */
.phead{display:flex;align-items:flex-end;gap:14px;margin-bottom:6px}
.phead .big{width:44px;height:44px;border-radius:9px;background:var(--navy);color:#fff;display:grid;place-items:center;font-weight:800;font-size:22px}
.phead h2{font-size:20px}
.phead .core{color:var(--slate);font-size:13px;margin-top:2px}
.tools{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:14px 0 18px}
.tools input[type=search],.tools select{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
.tools input[type=search]{min-width:200px}
.chk{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--slate)}

.card{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:14px;overflow:hidden}
.card.hidden{display:none}
.sc{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--soft);border-bottom:1px solid var(--line)}
.sc .ref{font-weight:800;color:var(--navy);font-size:13px;background:#e7eef6;border-radius:6px;padding:3px 8px}
.sc .nm{font-weight:700;font-size:15px;flex:1;min-width:0}
.tier{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em}
.tier.Núcleo{background:#fbe3d2;color:#9a4a1c}
.tier.Intermedio{background:#e2ebf6;color:#2c4d7a}
.tier.Avanzado{background:#ececec;color:#555}
.scmeta{display:flex;align-items:center;gap:10px}
.lvlchip{font-size:12px;font-weight:800;border-radius:7px;padding:4px 9px;background:#eef2f6;color:var(--slate);white-space:nowrap}
.prio{font-size:11px;font-weight:800;padding:4px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em}
.prio.ALTA{background:var(--alta);color:#fff}
.prio.MEDIA{background:var(--media);color:#3a2c08}
.prio.BAJA{background:#e7eaee;color:var(--baja)}
.prio.enley{background:#dff0e4;color:var(--enley)}

.src{padding:8px 16px;font-size:12px;color:var(--slate);border-bottom:1px solid var(--line);background:#fff}
.src b{color:#46586a;font-weight:700}
.item{padding:13px 16px;border-bottom:1px solid #eef1f5}
.item:last-child{border-bottom:0}
.item .q{font-size:14px;margin-bottom:9px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{width:40px;height:34px;border:0;border-right:1px solid var(--line);background:#fff;font-weight:800;color:var(--slate);font-size:14px;transition:.12s}
.seg button:last-child{border-right:0}
.seg button:hover{background:#f0f3f7}
.seg button.on0{background:var(--n0);color:#3a3f45}
.seg button.on1{background:var(--n1);color:#fff}
.seg button.on2{background:var(--n2);color:#3a3208}
.seg button.on3{background:var(--n3);color:#fff}
.seg button.on4{background:var(--n4);color:#fff}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.fields textarea{font-family:inherit;font-size:12.5px;border:1px solid var(--line);border-radius:8px;padding:7px 9px;
 resize:vertical;min-height:38px;color:var(--ink);background:#fff}
.fields label{font-size:11px;color:var(--slate);font-weight:600;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}

/* scale legend + footer notes */
.legend{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:18px}
.legend h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--slate);margin-bottom:8px}
.legend .row{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;padding:3px 0}
.legend .lv{flex:0 0 26px;height:22px;border-radius:5px;display:grid;place-items:center;font-weight:800;color:#fff;font-size:12px}
.notes{font-size:12px;color:var(--slate);line-height:1.6;padding:8px 2px 0}
.notes b{color:#46586a}

:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
@media (max-width:880px){
 .summary .grid{grid-template-columns:1fr 1fr;gap:10px}
 .radarbox{grid-column:1/-1}
 .main{grid-template-columns:1fr}
 .spine{position:static}
 .pnav{flex-direction:row;flex-wrap:wrap}
 .pnav button{width:auto}
 .pnav .pm,.pnav .bar{display:none}
 .fields{grid-template-columns:1fr}
}
@media print{
 header,.summary,.spine,.tools,.btn,.acts{display:none!important}
 .main{grid-template-columns:1fr}
 .card{break-inside:avoid;border-color:#ccc}
 body{background:#fff}
 .item .seg button:not(.on0):not(.on1):not(.on2):not(.on3):not(.on4){display:none}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
 <div class="top">
  <div class="brand">
   <div class="t">Autoevaluación de arquitectura legal de ciberseguridad</div>
   <div class="s">Arquetipo legislativo mínimo viable · América Latina y el Caribe · 10 pilares / 59 subpilares / 177 ítems</div>
  </div>
  <div class="acts">
   <button class="btn" id="bImport">Cargar</button>
   <button class="btn" id="bExport">Guardar (.json)</button>
   <button class="btn" id="bCsv">Exportar .csv</button>
   <button class="btn" id="bPrint">Imprimir / PDF</button>
   <button class="btn" id="bReset">Reiniciar</button>
   <input type="file" id="fImport" accept="application/json" style="display:none">
  </div>
 </div>
</header>

<div class="summary">
 <div class="wrap">
  <div class="grid">
   <div class="kpi"><div class="v" id="kAvg">0.00</div><div class="l">Nivel promedio (0–4)</div></div>
   <div class="kpi"><div class="v" id="kCov">0%</div><div class="l">Cobertura legal (≥3)</div></div>
   <div class="kpi"><div class="v" id="kOps">0%</div><div class="l">Madurez operativa (=4)</div></div>
   <div class="kpi"><div class="v" id="kGap">0</div><div class="l">Brechas Núcleo abiertas</div></div>
   <div class="radarbox"><svg id="radar" viewBox="0 0 200 170" aria-label="Radar de madurez por pilar"></svg><div class="cap">Madurez por pilar (0–4)</div></div>
  </div>
 </div>
</div>

<div class="wrap main">
 <nav class="spine">
  <h3>Pilares</h3>
  <div class="pnav" id="pnav"></div>
 </nav>
 <section id="content"></section>
</div>

<script id="data" type="application/json">__DATA__</script>
<script>
const APP = JSON.parse(document.getElementById('data').textContent);
const SCALE = APP.scale;
const NCOL = ['var(--n0)','var(--n1)','var(--n2)','var(--n3)','var(--n4)'];
const SUBS = []; APP.pillars.forEach(p=>p.subs.forEach(s=>{s.pid=p.id;SUBS.push(s);}));
const NSUB = SUBS.length;
const KEY = 'autoeval_ciber_alc_v2';

let state = {}; // id -> {n, ev, no}
function load(){ try{const r=localStorage.getItem(KEY); if(r) state=JSON.parse(r);}catch(e){} }
function save(){ try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){} }
function cell(ref,i){ const id=ref+'-'+i; if(!state[id]) state[id]={n:0,ev:'',no:''}; return state[id]; }

function subAvg(s){ let t=0; for(let i=0;i<s.items.length;i++) t+=cell(s.ref,i).n; return t/s.items.length; }
function pillarAvg(p){ let t=0; p.subs.forEach(s=>t+=subAvg(s)); return p.subs.length?t/p.subs.length:0; }
function labelFor(avg){ const r=Math.round(avg); return (SCALE.find(x=>x.n===r)||{}).label||''; }
function prioFor(s){ const a=subAvg(s); if(a>=3) return ['enley','En ley'];
 if(s.tier==='Núcleo') return ['ALTA','Alta']; if(s.tier==='Intermedio') return ['MEDIA','Media']; return ['BAJA','Baja']; }

let active = APP.pillars[0].id;
let filterTier='', onlyGap=false, q='';

/* ---- summary + radar ---- */
function metrics(){
 let sum=0,cov=0,ops=0,gap=0;
 SUBS.forEach(s=>{const a=subAvg(s); sum+=a; if(a>=3)cov++; if(a>=3.999)ops++; if(s.tier==='Núcleo'&&a<3)gap++;});
 return {avg:sum/NSUB, cov:cov/NSUB, ops:ops/NSUB, gap};
}
function fmtAvg(v){ const c=NCOL[Math.max(0,Math.min(4,Math.round(v)))]; return `${v.toFixed(2)} <small style="color:${c}">●</small>`; }

let radarCur = APP.pillars.map(()=>0);
function drawRadar(target){
 const svg=document.getElementById('radar'); const cx=100,cy=82,R=62,N=APP.pillars.length;
 const ang=k=>(-Math.PI/2)+k*2*Math.PI/N;
 const pt=(k,val)=>[cx+Math.cos(ang(k))*R*val/4, cy+Math.sin(ang(k))*R*val/4];
 let g='';
 for(let ring=1;ring<=4;ring++){ let d=''; for(let k=0;k<N;k++){const[x,y]=pt(k,ring); d+=(k?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' ';}
  g+=`<path d="${d}Z" fill="none" stroke="#33507a" stroke-width="${ring===4?1.1:.6}"/>`; }
 for(let k=0;k<N;k++){const[x,y]=pt(k,4); g+=`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#33507a" stroke-width=".6"/>`;
  const[lx,ly]=pt(k,4.55); g+=`<text x="${lx.toFixed(1)}" y="${(ly+3).toFixed(1)}" fill="#cdd9e6" font-size="9" font-weight="700" text-anchor="middle">${APP.pillars[k].id}</text>`; }
 let d=''; for(let k=0;k<N;k++){const[x,y]=pt(k,target[k]); d+=(k?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' ';}
 g+=`<path d="${d}Z" fill="rgba(200,162,75,.35)" stroke="${'#C8A24B'}" stroke-width="2"/>`;
 for(let k=0;k<N;k++){const[x,y]=pt(k,target[k]); g+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.2" fill="#C8A24B"/>`;}
 svg.innerHTML=g;
}
function updateRadar(){
 const tgt=APP.pillars.map(p=>pillarAvg(p));
 const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
 if(reduce){radarCur=tgt;drawRadar(tgt);return;}
 const from=radarCur.slice(); const t0=performance.now();
 function step(t){ const k=Math.min(1,(t-t0)/240); const cur=from.map((f,i)=>f+(tgt[i]-f)*k); drawRadar(cur);
  if(k<1) requestAnimationFrame(step); else radarCur=tgt; }
 requestAnimationFrame(step);
}
function updateSummary(){
 const m=metrics();
 document.getElementById('kAvg').innerHTML=fmtAvg(m.avg);
 document.getElementById('kCov').textContent=Math.round(m.cov*100)+'%';
 document.getElementById('kOps').textContent=Math.round(m.ops*100)+'%';
 document.getElementById('kGap').textContent=m.gap;
 updateRadar();
}

/* ---- nav ---- */
function renderNav(){
 const el=document.getElementById('pnav'); el.innerHTML='';
 APP.pillars.forEach(p=>{
  const a=pillarAvg(p), col=NCOL[Math.round(a)];
  const b=document.createElement('button'); b.className='pnav-b'+(p.id===active?' active':''); b.dataset.id=p.id;
  if(p.id===active) b.classList.add('active');
  b.innerHTML=`<span class="dot">${p.id}</span><span class="pm"><span class="nm">${p.name}</span>
   <span class="bar"><i style="width:${a/4*100}%;background:${col}"></i></span></span><span class="av">${a.toFixed(1)}</span>`;
  b.onclick=()=>{active=p.id;renderNav();renderContent();window.scrollTo({top:0,behavior:'smooth'});};
  el.appendChild(b);
 });
}

/* ---- content ---- */
function matchFilter(s){
 if(filterTier && s.tier!==filterTier) return false;
 if(onlyGap && !(s.tier==='Núcleo'&&subAvg(s)<3)) return false;
 if(q){ const hay=(s.ref+' '+s.name+' '+s.items.join(' ')).toLowerCase(); if(!hay.includes(q)) return false; }
 return true;
}
function renderContent(){
 const p=APP.pillars.find(x=>x.id===active);
 const c=document.getElementById('content');
 c.innerHTML=`
  <div class="phead"><div class="big">${p.id}</div><div><h2>${p.name}</h2><div class="core">${p.core}</div></div></div>
  <div class="legend"><h3>Escala de madurez</h3>${SCALE.map(s=>`<div class="row"><span class="lv" style="background:${NCOL[s.n]}">${s.n}</span><div><b>${s.label}.</b> ${s.desc}</div></div>`).join('')}
   <div class="notes"><b>Lectura:</b> nivel ≥ 3 = ya está en una ley especial (cobertura legal); nivel 4 = además verificable (madurez operativa). El nivel del subpilar es el <b>promedio</b> de sus 3 ítems.</div></div>
  <div class="tools">
   <input type="search" id="q" placeholder="Buscar en este pilar…" value="${q.replace(/"/g,'&quot;')}">
   <select id="ftier"><option value="">Todos los tiers</option><option>Núcleo</option><option>Intermedio</option><option>Avanzado</option></select>
   <label class="chk"><input type="checkbox" id="fgap"> Solo brechas Núcleo abiertas</label>
  </div>
  <div id="cards"></div>`;
 const sel=c.querySelector('#ftier'); sel.value=filterTier;
 c.querySelector('#fgap').checked=onlyGap;
 c.querySelector('#q').oninput=e=>{q=e.target.value.toLowerCase();renderCards();};
 sel.onchange=e=>{filterTier=e.target.value;renderCards();};
 c.querySelector('#fgap').onchange=e=>{onlyGap=e.target.checked;renderCards();};
 renderCards();
}
function renderCards(){
 const p=APP.pillars.find(x=>x.id===active);
 const box=document.getElementById('cards'); box.innerHTML='';
 let shown=0;
 p.subs.forEach(s=>{
  if(!matchFilter(s)) return; shown++;
  const card=document.createElement('div'); card.className='card'; card.dataset.ref=s.ref;
  const a=subAvg(s),[pc,pl]=prioFor(s);
  card.innerHTML=`
   <div class="sc"><span class="ref">${s.ref}</span><span class="nm">${s.name}</span>
    <span class="tier ${s.tier}">${s.tier}</span>
    <span class="scmeta"><span class="lvlchip" data-lvl>${a.toFixed(1)} · ${labelFor(a)}</span><span class="prio ${pc}" data-prio>${pl}</span></span></div>
   <div class="src"><b>Referencia comparada:</b> ${s.src}</div>
   ${s.items.map((it,i)=>{const cl=cell(s.ref,i);return `
    <div class="item">
     <div class="q">• ${it}</div>
     <div class="seg" role="group" aria-label="Nivel para ${s.ref} ítem ${i+1}">
      ${[0,1,2,3,4].map(n=>`<button data-r="${s.ref}" data-i="${i}" data-n="${n}" class="${cl.n===n?'on'+n:''}">${n}</button>`).join('')}
     </div>
     <div class="fields">
      <div><label>Evidencia (art./sección de su ley)</label><textarea data-r="${s.ref}" data-i="${i}" data-f="ev">${(cl.ev||'').replace(/</g,'&lt;')}</textarea></div>
      <div><label>Nota / acción</label><textarea data-r="${s.ref}" data-i="${i}" data-f="no">${(cl.no||'').replace(/</g,'&lt;')}</textarea></div>
     </div>
    </div>`;}).join('')}`;
  box.appendChild(card);
 });
 if(!shown) box.innerHTML='<div class="notes" style="padding:18px">Ningún subpilar coincide con el filtro. Ajusta la búsqueda o quita el filtro de brechas.</div>';
 box.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>setLevel(b));
 box.querySelectorAll('textarea').forEach(t=>t.oninput=()=>{const c=cell(t.dataset.r,+t.dataset.i);c[t.dataset.f]=t.value;debouncedSave();});
}
function refreshCard(ref){
 const card=document.querySelector(`.card[data-ref="${ref}"]`); if(!card) return;
 const s=SUBS.find(x=>x.ref===ref); const a=subAvg(s),[pc,pl]=prioFor(s);
 card.querySelector('[data-lvl]').textContent=`${a.toFixed(1)} · ${labelFor(a)}`;
 const pr=card.querySelector('[data-prio]'); pr.className='prio '+pc; pr.textContent=pl;
}
function setLevel(btn){
 const ref=btn.dataset.r,i=+btn.dataset.i,n=+btn.dataset.n;
 cell(ref,i).n=n;
 const seg=btn.parentElement; seg.querySelectorAll('button').forEach(x=>x.className='');
 btn.className='on'+n;
 refreshCard(ref); renderNav(); updateSummary(); debouncedSave();
}

let saveT; function debouncedSave(){ clearTimeout(saveT); saveT=setTimeout(save,400); }

/* ---- export / import ---- */
function download(name,text,type){ const b=new Blob([text],{type}); const u=URL.createObjectURL(b);
 const a=document.createElement('a'); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }
function tstamp(){ return new Date().toISOString().slice(0,10); }
document.getElementById('bExport').onclick=()=>download(`autoevaluacion_ciber_${tstamp()}.json`,JSON.stringify({version:2,saved:new Date().toISOString(),state},null,2),'application/json');
document.getElementById('bImport').onclick=()=>document.getElementById('fImport').click();
document.getElementById('fImport').onchange=e=>{const f=e.target.files[0]; if(!f)return; const r=new FileReader();
 r.onload=()=>{try{const o=JSON.parse(r.result); state=o.state||o; save(); renderNav(); renderContent(); updateSummary();}catch(err){alert('Archivo no válido.');}}; r.readAsText(f);};
document.getElementById('bCsv').onclick=()=>{
 const rows=[['Pilar','Ref','Subpilar','Tier','Item_n','Item','Nivel','Etiqueta','Evidencia','Nota','Nivel_subpilar','En_ley','Prioridad','Referencia']];
 APP.pillars.forEach(p=>p.subs.forEach(s=>{const a=subAvg(s),[pc,pl]=prioFor(s);
  s.items.forEach((it,i)=>{const c=cell(s.ref,i);
   rows.push([p.id,s.ref,s.name,s.tier,i+1,it,c.n,labelFor(c.n),c.ev||'',c.no||'',a.toFixed(2),a>=3?'Sí':'No',pl,s.src]);});}));
 const csv=rows.map(r=>r.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(',')).join('\r\n');
 download(`autoevaluacion_ciber_${tstamp()}.csv`,'\uFEFF'+csv,'text/csv');
