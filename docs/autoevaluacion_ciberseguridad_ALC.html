<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Autoevaluación de arquitectura legal de ciberseguridad · ALC</title>
<style>
:root{
 --navy:#152844; --navy2:#1F3A5F; --gold:#C8A24B; --ink:#1b2530; --slate:#5a6b7b;
 --line:#dbe2ea; --bg:#eef2f6; --card:#ffffff; --soft:#f6f8fb;
 --n0:#c9ccd1; --n1:#d98c5f; --n2:#e6c14b; --n3:#7bb36b; --n4:#2f8f57;
 --alta:#cf4b57; --media:#e0a23c; --baja:#8893a0; --enley:#2f8f57;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
 color:var(--ink);background:var(--bg);font-size:15px;line-height:1.45}
h1,h2,h3{margin:0;font-weight:700;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px}

/* top bar */
header{background:var(--navy);color:#fff;border-bottom:3px solid var(--gold)}
.top{display:flex;align-items:center;gap:18px;padding:14px 20px;max-width:1180px;margin:0 auto;flex-wrap:wrap}
.brand{display:flex;flex-direction:column;gap:2px;margin-right:auto}
.brand .t{font-size:16px;font-weight:700}
.brand .s{font-size:12px;color:#b9c6d6;font-weight:500}
.acts{display:flex;gap:8px;flex-wrap:wrap}
.btn{background:transparent;color:#dce5ef;border:1px solid #3a4f6c;border:1px solid #3a4f6c;border-radius:7px;padding:7px 11px;font-size:13px;font-weight:600;transition:.15s}
.btn:hover{background:#22375a;color:#fff}
.btn.gold{background:var(--gold);color:#2a2410;border-color:var(--gold)}
.btn.gold:hover{filter:brightness(1.06)}

/* summary strip */
.summary{background:var(--navy2);color:#fff;padding:16px 0}
.summary .grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 220px;gap:14px;align-items:center}
.kpi{background:#1a3050;border:1px solid #2c456a;border-radius:10px;padding:10px 14px}
.kpi .v{font-size:26px;font-weight:800;line-height:1}
.kpi .l{font-size:11.5px;color:#b9c6d6;margin-top:4px;text-transform:uppercase;letter-spacing:.04em}
.kpi .v small{font-size:14px;font-weight:700;color:#c7d2df}
.radarbox{display:flex;flex-direction:column;align-items:center}
.radarbox svg{width:200px;height:170px}
.radarbox .cap{font-size:11px;color:#9fb0c4;margin-top:2px}

/* layout */
.main{display:grid;grid-template-columns:230px 1fr;gap:24px;padding:22px 0 60px}
.spine{position:sticky;top:14px;align-self:start}
.spine h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--slate);margin-bottom:10px}
.pnav{display:flex;flex-direction:column;gap:4px}
.pnav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:0;
 border-left:3px solid transparent;padding:8px 8px 8px 9px;border-radius:0 8px 8px 0;color:var(--ink);transition:.15s}
.pnav button:hover{background:#e6ecf3}
.pnav button.active{background:#fff;border-left-color:var(--gold);box-shadow:0 1px 3px rgba(20,40,68,.08)}
.pnav .dot{width:24px;height:24px;border-radius:6px;background:var(--navy);color:#fff;display:grid;place-items:center;
 font-weight:800;font-size:13px;flex:0 0 auto}
.pnav .pm{flex:1;min-width:0}
.pnav .pm .nm{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pnav .bar{height:5px;border-radius:3px;background:#dde4ec;margin-top:4px;overflow:hidden}
.pnav .bar i{display:block;height:100%;width:0;background:var(--n2);transition:width .3s,background .3s}
.pnav .av{font-size:12px;font-weight:800;color:var(--slate);flex:0 0 auto;width:26px;text-align:right}

/* content */
.phead{display:flex;align-items:flex-end;gap:14px;margin-bottom:6px}
.phead .big{width:44px;height:44px;border-radius:9px;background:var(--navy);color:#fff;display:grid;place-items:center;font-weight:800;font-size:22px}
.phead h2{font-size:20px}
.phead .core{color:var(--slate);font-size:13px;margin-top:2px}
.tools{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:14px 0 18px}
.tools input[type=search],.tools select{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
.tools input[type=search]{min-width:200px}
.chk{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--slate)}

.card{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:14px;overflow:hidden}
.card.hidden{display:none}
.sc{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--soft);border-bottom:1px solid var(--line)}
.sc .ref{font-weight:800;color:var(--navy);font-size:13px;background:#e7eef6;border-radius:6px;padding:3px 8px}
.sc .nm{font-weight:700;font-size:15px;flex:1;min-width:0}
.tier{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em}
.tier.Núcleo{background:#fbe3d2;color:#9a4a1c}
.tier.Intermedio{background:#e2ebf6;color:#2c4d7a}
.tier.Avanzado{background:#ececec;color:#555}
.scmeta{display:flex;align-items:center;gap:10px}
.lvlchip{font-size:12px;font-weight:800;border-radius:7px;padding:4px 9px;background:#eef2f6;color:var(--slate);white-space:nowrap}
.prio{font-size:11px;font-weight:800;padding:4px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em}
.prio.ALTA{background:var(--alta);color:#fff}
.prio.MEDIA{background:var(--media);color:#3a2c08}
.prio.BAJA{background:#e7eaee;color:var(--baja)}
.prio.enley{background:#dff0e4;color:var(--enley)}

.src{padding:8px 16px;font-size:12px;color:var(--slate);border-bottom:1px solid var(--line);background:#fff}
.src b{color:#46586a;font-weight:700}
.item{padding:13px 16px;border-bottom:1px solid #eef1f5}
.item:last-child{border-bottom:0}
.item .q{font-size:14px;margin-bottom:9px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{width:40px;height:34px;border:0;border-right:1px solid var(--line);background:#fff;font-weight:800;color:var(--slate);font-size:14px;transition:.12s}
.seg button:last-child{border-right:0}
.seg button:hover{background:#f0f3f7}
.seg button.on0{background:var(--n0);color:#3a3f45}
.seg button.on1{background:var(--n1);color:#fff}
.seg button.on2{background:var(--n2);color:#3a3208}
.seg button.on3{background:var(--n3);color:#fff}
.seg button.on4{background:var(--n4);color:#fff}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.fields textarea{font-family:inherit;font-size:12.5px;border:1px solid var(--line);border-radius:8px;padding:7px 9px;
 resize:vertical;min-height:38px;color:var(--ink);background:#fff}
.fields label{font-size:11px;color:var(--slate);font-weight:600;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}

/* scale legend + footer notes */
.legend{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:18px}
.legend h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--slate);margin-bottom:8px}
.legend .row{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;padding:3px 0}
.legend .lv{flex:0 0 26px;height:22px;border-radius:5px;display:grid;place-items:center;font-weight:800;color:#fff;font-size:12px}
.notes{font-size:12px;color:var(--slate);line-height:1.6;padding:8px 2px 0}
.notes b{color:#46586a}

:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
@media (max-width:880px){
 .summary .grid{grid-template-columns:1fr 1fr;gap:10px}
 .radarbox{grid-column:1/-1}
 .main{grid-template-columns:1fr}
 .spine{position:static}
 .pnav{flex-direction:row;flex-wrap:wrap}
 .pnav button{width:auto}
 .pnav .pm,.pnav .bar{display:none}
 .fields{grid-template-columns:1fr}
}
@media print{
 header,.summary,.spine,.tools,.btn,.acts{display:none!important}
 .main{grid-template-columns:1fr}
 .card{break-inside:avoid;border-color:#ccc}
 body{background:#fff}
 .item .seg button:not(.on0):not(.on1):not(.on2):not(.on3):not(.on4){display:none}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
 <div class="top">
  <div class="brand">
   <div class="t">Autoevaluación de arquitectura legal de ciberseguridad</div>
   <div class="s">Arquetipo legislativo mínimo viable · América Latina y el Caribe · 10 pilares / 59 subpilares / 177 ítems</div>
  </div>
  <div class="acts">
   <button class="btn" id="bImport">Cargar</button>
   <button class="btn" id="bExport">Guardar (.json)</button>
   <button class="btn" id="bCsv">Exportar .csv</button>
   <button class="btn" id="bPrint">Imprimir / PDF</button>
   <button class="btn" id="bReset">Reiniciar</button>
   <input type="file" id="fImport" accept="application/json" style="display:none">
  </div>
 </div>
</header>

<div class="summary">
 <div class="wrap">
  <div class="grid">
   <div class="kpi"><div class="v" id="kAvg">0.00</div><div class="l">Nivel promedio (0–4)</div></div>
   <div class="kpi"><div class="v" id="kCov">0%</div><div class="l">Cobertura legal (≥3)</div></div>
   <div class="kpi"><div class="v" id="kOps">0%</div><div class="l">Madurez operativa (=4)</div></div>
   <div class="kpi"><div class="v" id="kGap">0</div><div class="l">Brechas Núcleo abiertas</div></div>
   <div class="radarbox"><svg id="radar" viewBox="0 0 200 170" aria-label="Radar de madurez por pilar"></svg><div class="cap">Madurez por pilar (0–4)</div></div>
  </div>
 </div>
</div>

<div class="wrap main">
 <nav class="spine">
  <h3>Pilares</h3>
  <div class="pnav" id="pnav"></div>
 </nav>
 <section id="content"></section>
</div>

<script id="data" type="application/json">{"meta": {"pilares": 10, "subpilares": 59, "items": 177}, "scale": [{"n": 0, "label": "Ausente", "desc": "No hay base normativa identificable para el elemento."}, {"n": 1, "label": "Disperso / implícito", "desc": "Existe solo en normas penales, sectoriales o administrativas fragmentadas (brecha conceptual)."}, {"n": 2, "label": "Previsto no habilitante", "desc": "Mencionado, pero sin lex specialis, sin competencias ni estándares verificables (brecha normativa)."}, {"n": 3, "label": "Establecido en ley especial", "desc": "Definido en ley, con autoridad y deberes exigibles (arquitectura legal cubierta)."}, {"n": 4, "label": "Establecido y verificable", "desc": "Además con métricas/KPIs, plazos y trazabilidad operativa (cierre de la brecha operativa)."}], "pillars": [{"id": "A", "name": "Gobernanza y coordinación nacional", "core": "Arquitectura institucional mínima para que la ley sea ejecutable.", "subs": [{"ref": "A1", "name": "Definiciones", "tier": "Núcleo", "src": "NIS2 art. 6; Chile art. 2; Japón Basic Act art. 2", "items": ["Define los términos núcleo (incidente, riesgo, vulnerabilidad, entidad obligada) de forma cerrada.", "Alinea la terminología con estándares y con otras leyes (penal, datos, sectorial), sin contradicciones.", "No esconde obligaciones materiales dentro de las definiciones (un término, un significado)."]}, {"ref": "A2", "name": "Ámbito y extraterritorialidad", "tier": "Núcleo", "src": "NIS2 ámbito/Anexos I-II; Singapur s.3; Chile art. 4", "items": ["Delimita el alcance material, subjetivo y sectorial (qué sí y qué no).", "Usa impacto sistémico/criticidad como criterio (no solo tamaño) y prevé exclusiones e interfaces.", "Regula la extraterritorialidad funcional (aplica si el servicio afecta al país)."]}, {"ref": "A3", "name": "Autoridad / Agencia nacional", "tier": "Núcleo", "src": "NIS2; Chile (ANCI); Singapur; Japón", "items": ["Crea la autoridad con mandato legal expreso y función rectora/coordinadora.", "Le otorga potestad normativa secundaria, de información, supervisión y sanción.", "Le asegura presupuesto, personal y autonomía técnica; separa asistencia de sanción."]}, {"ref": "A4", "name": "Estrategia, políticas, planes y KPIs", "tier": "Núcleo", "src": "NIS2 art. 7", "items": ["Exige estrategia nacional con objetivos, responsables y secuencia de implementación.", "Incluye indicadores (KPIs) y mecanismos de revisión periódica.", "Distingue la estrategia (ex ante) de las potestades/sanciones de la ley."]}, {"ref": "A5", "name": "Roles institucionales", "tier": "Núcleo", "src": "NIS2 (management bodies/SPOC/CSIRT); Chile; México art. 168 Bis 13", "items": ["Asigna accountability a la alta dirección u órgano de gobierno.", "Crea gestión especializada (CISO/delegado) distinta del jefe de TI.", "Define coordinación/respuesta (SPOC, CSIRT) y canales de reporte vertical y horizontal."]}, {"ref": "A6", "name": "Consejo multiactor", "tier": "Intermedio", "src": "Chile (Consejo Multisectorial); UE SCCG; Japón Expert Council", "items": ["Institucionaliza un consejo consultivo permanente y plural (no consulta esporádica).", "Define su función como consultiva (asesora, no decide).", "Fija reglas de integridad, abstención y reserva."]}, {"ref": "A7", "name": "Transparencia y derechos", "tier": "Núcleo", "src": "NIS2 rec. 51; Chile art. 3", "items": ["Fija salvaguardas de derechos como límite (legalidad, necesidad, proporcionalidad).", "Protege el cifrado de extremo a extremo frente a debilitamientos estructurales.", "Incluye una cláusula de no-retroceso (no degradar garantías ya reconocidas)."]}, {"ref": "A8", "name": "Métricas y rendición de cuentas", "tier": "Intermedio", "src": "NIS2 art. 19; Cyber Solidarity Act art. 21", "items": ["Obliga a medir estrategia y capacidades con métricas ordinarias.", "Prevé evaluación institucional independiente o entre pares.", "Institucionaliza la revisión post-incidente (aprendizaje)."]}, {"ref": "A9", "name": "Ventanilla única (one-stop)", "tier": "Intermedio", "src": "NIS2 (SPOC); DORA art. 21", "items": ["Establece un punto único de contacto (one-stop).", "Fija reglas anti-duplicidad: el regulado reporta una vez y el Estado redistribuye.", "Armoniza contenidos/plantillas de reporte entre autoridades."]}, {"ref": "A10", "name": "VEP (0-days)", "tier": "Avanzado", "src": "EE. UU.: VEP 2017", "items": ["Crea un proceso estatal trazable para ponderar retención/divulgación de 0-days.", "Lo asigna a una instancia colegiada con secretaría y registro documental.", "Impone reevaluación periódica (no retención indefinida) e informe."]}]}, {"id": "B", "name": "Capacidades operativas del Estado", "core": "Músculo técnico permanente para ver, responder y coordinar.", "subs": [{"ref": "B1", "name": "CSIRT / CERT nacionales o sectoriales", "tier": "Núcleo", "src": "NIS2 art. 11; Chile", "items": ["Designa formalmente uno o más CSIRT y define su constituency.", "Fija mandato mínimo, disponibilidad continua y canales seguros.", "Asegura recursos/continuidad y reglas de coordinación nacional e internacional."]}, {"ref": "B2", "name": "Gestión de crisis y continuidad", "tier": "Núcleo", "src": "NIS2 arts. 9, 16; DORA art. 11", "items": ["Designa autoridad/comité de gestión de crisis de gran escala.", "Exige un plan nacional de respuesta con roles, umbrales y escalamiento.", "Ordena ejercicios periódicos, protocolos de comunicación y continuidad de funciones críticas."]}, {"ref": "B3", "name": "CTI y compartición", "tier": "Intermedio", "src": "NIS2 art. 29, rec. 119; EE. UU. 6 U.S.C. §1505", "items": ["Habilita el intercambio voluntario/estructurado de CTI (IoC, TTPs, near misses).", "Otorga safe harbor frente a responsabilidad por compartir de buena fe.", "Resuelve la tensión de competencia/antimonopolio para que la información circule."]}, {"ref": "B4", "name": "GovSOC / Centro Nacional", "tier": "Avanzado", "src": "Cyber Solidarity Act; NIS2", "items": ["Crea capacidad de monitoreo continuo del sector público (GovSOC).", "Habilita correlación de telemetría y producción de alertas/conciencia situacional.", "Establece enlace técnico directo con el CSIRT e interoperabilidad con estructuras de alerta."]}, {"ref": "B5", "name": "Respuesta comunicacional", "tier": "Intermedio", "src": "NIS2; CSA arts. 7, 10; DORA arts. 6, 11, 14", "items": ["Define avisos a los afectados y al público cuando proceda.", "Coordina mensajes entre autoridades técnicas, regulatorias y de crisis (portavoz/roles).", "Prevé auxilio/solidaridad de emergencia y documentación de resultados."]}]}, {"id": "C", "name": "Gestión de riesgos e higiene digital", "core": "Capa mínima y continua de gestión del riesgo en cada entidad obligada.", "subs": [{"ref": "C1", "name": "ISMS / SGSI", "tier": "Núcleo", "src": "NIS2 art. 21; Reg. (UE) 2024/2690", "items": ["Exige medidas técnicas/organizativas apropiadas y proporcionales (enfoque all-hazards).", "Cubre el ciclo política → riesgo → controles → monitoreo → mejora (sistema, no checklist).", "Remite a estándares (ISO 27001/27002) como referente, sin imponer certificación cerrada."]}, {"ref": "C2", "name": "Cadena de suministro / MSP / MSSP", "tier": "Núcleo", "src": "NIS2 art. 21(2)(d) y (3); CRA Anexo VIII, art. 53", "items": ["Obliga a gestionar el riesgo de proveedores directos y MSP/MSSP.", "Considera vulnerabilidades y calidad de prácticas del proveedor en la selección.", "Habilita trazabilidad de componentes (SBOM) y mejores contratos."]}, {"ref": "C3", "name": "Nube / servicios gestionados", "tier": "Intermedio", "src": "NIS2; Reg. (UE) 2024/2690; Reg. (UE) 2023/1543; CLOUD Act; EUCS", "items": ["Asegura control operativo real (logs, telemetría, portabilidad), no solo localización.", "Aclara que externalizar infraestructura no externaliza la responsabilidad.", "Aborda la soberanía operativa sin convertirla en proteccionismo encubierto."]}, {"ref": "C4", "name": "Awareness y formación por rol", "tier": "Intermedio", "src": "NIS2 arts. 20, 21; DORA art. 13; CSA art. 10", "items": ["Impone ciberhigiene básica como piso común.", "Exige formación periódica proporcional al rol, incluida la alta dirección.", "Alcanza a terceros/proveedores en funciones críticas, con gobernanza y presupuesto."]}, {"ref": "C5", "name": "Divulgación responsable / buena fe", "tier": "Intermedio", "src": "CRA arts. 13, 14; DOJ CFAA", "items": ["Exige una política de divulgación (VDP) con alcance, reglas y punto de contacto.", "Estructura recepción, análisis, remediación y respuesta al reportante (CVD).", "Reconoce safe harbor para investigación de buena fe y delimita pruebas autorizadas."]}]}, {"id": "D", "name": "Infraestructuras esenciales / sectores críticos", "core": "Obligaciones reforzadas para quienes, si caen, arrastran a otros.", "subs": [{"ref": "D1", "name": "Sectores / operadores esenciales", "tier": "Núcleo", "src": "NIS2 art. 3/Anexos; CER arts. 5, 6; Chile art. 4", "items": ["Define el criterio de entrada (qué sectores/servicios entran por ley).", "Permite intensificación/designación administrativa por criticidad.", "Mantiene un registro/lista nacional con revisión periódica."]}, {"ref": "D2", "name": "Obligaciones reforzadas", "tier": "Intermedio", "src": "NIS2 arts. 20, 21, 23; CER arts. 12, 13; DORA arts. 11, 24, 26", "items": ["Impone obligaciones avanzadas escalables y proporcionales al riesgo sistémico.", "Exige continuidad con metas (RTO/RPO) y validación, no solo políticas escritas.", "Habilita pruebas avanzadas (tipo TLPT) para los operadores más sensibles."]}, {"ref": "D3", "name": "Supervisión sectorial y coordinación", "tier": "Núcleo", "src": "NIS2 art. 8; CER arts. 9, 19; Chile arts. 25, 26, 37", "items": ["Designa autoridad(es) competente(s) y un punto único de contacto.", "Fija reglas expresas de reparto competencial (rectoría + sectoriales equivalentes).", "Establece coordinación previa anti-duplicidad/solapamiento."]}, {"ref": "D4", "name": "Interdependencias / cascada", "tier": "Avanzado", "src": "NIS2 arts. 21, 22; CER arts. 5, 12; Cyber Solidarity Act arts. 3, 5, 21", "items": ["Exige evaluación nacional de interdependencias intersectoriales.", "Obliga a cada entidad crítica a evaluar sus dependencias mutuas.", "Habilita pruebas conjuntas y revisión de incidentes sistémicos (efecto cascada)."]}, {"ref": "D5", "name": "OT / ICS (físico-lógico)", "tier": "Avanzado", "src": "NIS2; CER; CRA; ISA/IEC 62443", "items": ["Da tratamiento específico a OT/ICS cuando hay proceso físico-digital relevante.", "Remite a un marco técnico reconocido (p. ej. ISA/IEC 62443) sin absorber su detalle.", "Distribuye responsabilidades por roles (asset owner, integrador, proveedor) y habilita auditoría."]}]}, {"id": "E", "name": "Reportes y gestión de incidentes", "core": "Notificación escalonada, aprendizaje y retroalimentación.", "subs": [{"ref": "E1", "name": "Umbrales y plazos", "tier": "Núcleo", "src": "NIS2 art. 23; DORA art. 19 + Reg. Del. 2025/301; RGPD art. 33", "items": ["Fija un umbral de significancia que dispara el deber de reportar.", "Establece reporte escalonado por fases con plazos (p. ej. 24 h / 72 h / final).", "Define el canal/autoridad receptora y la trazabilidad del expediente."]}, {"ref": "E2", "name": "Contenido del reporte", "tier": "Núcleo", "src": "NIS2; DORA; RGPD; CIRCIA/NPRM", "items": ["Define el contenido por fases (alerta temprana / notificación / informe final).", "Asegura información suficiente para triage y correlación (IoC, TTPs).", "Permite que la autoridad/CSIRT cierre el bucle con acuse, feedback y orientación."]}, {"ref": "E3", "name": "Ransomware", "tier": "Avanzado", "src": "CIRCIA/NPRM; OFAC; FinCEN; UE (propuesta NIS2 2026)", "items": ["Distingue el ransomware (cifrado, exfiltración, amenaza de publicación) del incidente genérico.", "Crea reporte específico del pago con plazo perentorio y conexión al expediente.", "Activa coordinación con sanciones y con AML/CFT cuando proceda."]}, {"ref": "E4", "name": "Protección del informante / víctima", "tier": "Núcleo", "src": "NIS2 arts. 23, 30; Dir. (UE) 2019/1937; CISA 2015", "items": ["La mera notificación no agrava la responsabilidad ni es admisión de culpa.", "Protege la confidencialidad del informante de buena fe frente a represalias.", "Permite reportes voluntarios y de near misses por canal seguro."]}, {"ref": "E5", "name": "Clasificación de severidad", "tier": "Intermedio", "src": "NIS2; DORA + Reg. Del. 2024/1772", "items": ["Define criterios comunes de severidad (no a discreción del reportante).", "Los vincula con variables objetivas y verificables.", "Conecta severidad con disparadores de reporte y escalamiento; deja margen sectorial."]}, {"ref": "E6", "name": "Lecciones aprendidas / post-mortem", "tier": "Intermedio", "src": "NIS2; DORA art. 13; Cyber Solidarity Act art. 21", "items": ["Obliga a revisión posterior interna (causa raíz, eficacia de respuesta) supervisable.", "Verifica si procedimientos, escalamiento y comunicación funcionaron.", "Prevé aprendizaje sistémico para incidentes significativos o transfronterizos."]}, {"ref": "E7", "name": "Interoperabilidad de reportes", "tier": "Avanzado", "src": "NIS2 art. 23(11); DORA + Reg. Ej. 2025/302; STIX/TAXII", "items": ["Define formularios, campos obligatorios, glosarios y validaciones.", "Exige canales seguros y circuito de respuesta/actualización (sin pedir lo mismo dos veces).", "Habilita interoperabilidad técnica avanzada (STIX 2.1/TAXII 2.1) entre autoridades/CSIRTs."]}]}, {"id": "F", "name": "Seguridad de productos, servicios y certificación", "core": "Deberes del fabricante durante todo el ciclo de vida.", "subs": [{"ref": "F1", "name": "Productos / IoT", "tier": "Intermedio", "src": "CRA; RED + Reg. Del. 2022/30", "items": ["Impone diseño seguro, evaluación de riesgo y período de soporte comunicable.", "Exige manejo de vulnerabilidades/CVD con punto de contacto durante el soporte.", "Regula el fin de soporte (EoL) visible y extiende la lógica a IoT/radio."]}, {"ref": "F2", "name": "Conformidad / certificación proporcional", "tier": "Avanzado", "src": "CRA (Anexo VIII); CSA art. 46; CRA art. 27", "items": ["Hace la intensidad de evaluación proporcional al riesgo del producto.", "Distingue conformidad, certificación y marcado.", "Evita esquemas nacionales fragmentados (interopera con esquemas reconocidos)."]}, {"ref": "F3", "name": "Etiquetado / información al usuario", "tier": "Intermedio", "src": "CRA", "items": ["Exige informar el fin de soporte (al menos mes/año) antes o al momento de compra.", "Publica el canal de reporte de vulnerabilidades.", "Mantiene la información accesible durante el período de soporte/actualización."]}, {"ref": "F4", "name": "Seguro cibernético", "tier": "Avanzado", "src": "DORA art. 27; Francia LOPMI; EIOPA/ENISA", "items": ["Lo trata como mecanismo complementario de mercado (no pilar sustantivo).", "No confunde los planos (entidad / responsabilidad profesional / señalización).", "Evita imponer seguro obligatorio sin condiciones claras."]}, {"ref": "F5", "name": "Reconocimiento / vigilancia / retiros", "tier": "Avanzado", "src": "CSA art. 58, EUCC; CRA arts. 53, 54, 56", "items": ["Reconoce ordenadamente esquemas/certificados para evitar fragmentación.", "Designa autoridad(es) con poderes reales de vigilancia de mercado.", "Prevé medidas correctivas claras (restricción, retiro, recall, suspensión) y escalamiento."]}, {"ref": "F6", "name": "Responsabilidad por vulnerabilidades graves", "tier": "Avanzado", "src": "CRA arts. 13, 64, Anexo I; PLD 2024/2853", "items": ["Fija un deber de diligencia (secure-by-design/default, vulnerability handling).", "Prevé sanciones administrativas por incumplir ese deber.", "Articula responsabilidad civil por producto defectuoso (defecto + daño + causalidad)."]}]}, {"id": "G", "name": "Cooperación internacional y ciberdiplomacia", "core": "Cooperación exterior como capacidad operativa permanente.", "subs": [{"ref": "G1", "name": "Mecanismos de cooperación", "tier": "Intermedio", "src": "Budapest art. 35; OSCE 1202; OEA/CICTE; NIS2 arts. 14-16", "items": ["Estructura canales 24/7 para intercambio urgente.", "Prevé medidas de confianza (CBMs) y redes operativas de CSIRTs.", "No confunde la cooperación penal (Budapest) con la técnico-operativa."]}, {"ref": "G2", "name": "Asistencia mutua no penal", "tier": "Intermedio", "src": "NIS2 arts. 11, 15, 17; OEA/CICTE", "items": ["Separa expresamente la cooperación técnico-operativa de la penal.", "Habilita auxilio técnico (alertas, contención, recuperación) sin expediente penal previo.", "Da base legal autónoma para no desplazar todo a los carriles penales lentos."]}, {"ref": "G3", "name": "Gestión de crisis y mando", "tier": "Intermedio", "src": "NIS2 arts. 9, 16; CER art. 9", "items": ["Designa autoridad nacional de gestión de cibercrisis (y la coordinadora si hay varias).", "Exige un plan nacional de respuesta a crisis de gran escala.", "Conecta el plano operativo con el político y con mecanismos regionales."]}, {"ref": "G4", "name": "Medidas restrictivas / respuesta diplomática", "tier": "Avanzado", "src": "UE PESC 2019/797 + Reg. 2019/796; UK 2020; EE. UU. EO 13694/13757", "items": ["Institucionaliza el procedimiento de respuesta (no una lista exhaustiva de sanciones).", "Distingue atribución técnica, atribución político-jurídica y decisión de respuesta.", "Habilita una gama graduada de medidas con criterios de proporcionalidad/escalada."]}, {"ref": "G5", "name": "Interoperabilidad y confidencialidad", "tier": "Intermedio", "src": "TLP 2.0 (FIRST); NIS2 art. 29", "items": ["Reconoce protocolos de sensibilidad (TLP 2.0) para el intercambio.", "Habilita arreglos formales de re-share (plataformas, automatización, condiciones).", "Aclara que esos protocolos no sustituyen protección de datos/seguridad nacional/NDAs."]}, {"ref": "G6", "name": "Ciberdiplomacia institucionalizada", "tier": "Avanzado", "src": "EE. UU. 22 U.S.C. §§ 10301-10305; UE Digital Diplomacy 2022", "items": ["Crea un punto focal de ciberdiplomacia con mandato expreso.", "Coordina con autoridades de ciberseguridad, defensa, justicia y regulación.", "Dota de capacidad diplomática especializada desplegable (no oficina en cada misión)."]}, {"ref": "G7", "name": "Posición sobre derecho internacional en ciberespacio", "tier": "Avanzado", "src": "UNIDIR 2024; Países Bajos 2019", "items": ["Manda elaborar y publicar una posición nacional sobre derecho internacional en ciberespacio.", "Asegura coordinación interinstitucional para hablar con una sola voz.", "Prevé actualización periódica (posición dinámica, no inmutable)."]}]}, {"id": "H", "name": "Gobierno, compras públicas y fomento", "core": "Poder de compra del Estado como palanca de ciberseguridad.", "subs": [{"ref": "H1", "name": "Requisitos en contratación pública", "tier": "Intermedio", "src": "EE. UU. EO 14028/OMB (rescind. M-26-05); NIS2 art. 7; CSA; FedRAMP", "items": ["Exige evidencia de desarrollo seguro (atestación/SSDF) en la compra.", "Pide SBOM con elementos mínimos y formato utilizable.", "Exige VDP/CVD y escala la exigencia según criticidad del bien."]}, {"ref": "H2", "name": "Clausulados MSP / MSSP", "tier": "Intermedio", "src": "NIS2 consid. 85-86; DORA arts. 28, 30; Reg. (UE) 2024/2690", "items": ["Exige due diligence y valoración de concentración/criticidad en la selección.", "Fija arquitectura contractual mínima (SLA, localización, auditoría basada en riesgo).", "Obliga asistencia en incidentes, remediación y causales de terminación."]}, {"ref": "H3", "name": "Preferencia / inhabilitación", "tier": "Avanzado", "src": "Chile art. 11(v), Ley 19.886; Dir. 2014/24/UE art. 57; NIS2 arts. 31-36", "items": ["Usa la madurez verificable como criterio de elegibilidad/evaluación.", "Articula con el régimen de compras la exclusión por incumplimiento grave.", "Conecta con un sistema de proveedores inhabilitados."]}, {"ref": "H4", "name": "Fuerza laboral", "tier": "Intermedio", "src": "NIS2 arts. 7, 20, 21; DORA art. 13; Chile art. 11(i); ECSF; NICE", "items": ["Profesionaliza por perfiles y competencias mínimas (no capacitación genérica).", "Habilita referenciar marcos (ECSF/NICE) para perfiles y trayectorias.", "Alcanza a directivos, alta dirección y contratistas críticos, con presupuesto."]}, {"ref": "H5", "name": "Apoyos a PYMES", "tier": "Intermedio", "src": "NIS2 consid. 56-57, art. 7(2)(i); CSA art. 10", "items": ["Prevé guía y asistencia fácilmente accesibles para PYMES.", "Crea puntos de contacto y herramientas/servicios concretos.", "Evita exigir sin apoyar (que la PYME no sea el eslabón débil)."]}, {"ref": "H6", "name": "Fondo / asistencia a víctimas críticas", "tier": "Avanzado", "src": "Chile art. 11(m); NIS2 art. 11(3); Cyber Solidarity Act arts. 10, 11", "items": ["Habilita asistencia técnica directa a entidades afectadas por incidentes significativos.", "Apoya respuesta e inicio de recuperación cuando las capacidades ordinarias no bastan.", "Materializa el apoyo (proveedores precontratados, subvenciones o equivalentes)."]}]}, {"id": "I", "name": "Transparencia, presupuesto y sostenibilidad", "core": "Dinero visible, datos, revisión e incentivos para durar.", "subs": [{"ref": "I1", "name": "Presupuesto etiquetado", "tier": "Núcleo", "src": "NIS2 arts. 7, 8, 11; Cyber Solidarity Act arts. 10, 11; Chile (ANCI)", "items": ["Crea base legal para financiar capacidades (no a mero arbitrio anual).", "Asegura suficiencia y continuidad (financiamiento estructural y de emergencia).", "Prevé trazabilidad/etiquetado presupuestario cuando el sistema lo permita."]}, {"ref": "I2", "name": "Publicación de estadísticas", "tier": "Intermedio", "src": "NIS2 art. 18; Chile art. 11(f), 24(h); CSA art. 9", "items": ["Recolecta datos de incidentes de forma estructurada.", "Agrega y anonimiza antes de difundir.", "Publica periódicamente en formatos reutilizables, con límites de seguridad."]}, {"ref": "I3", "name": "Revisión quinquenal", "tier": "Núcleo", "src": "NIS2 arts. 7(4), 19; CER", "items": ["Exige revisión periódica (≈5 años) basada en KPIs.", "Cubre capacidades, implementación real y alineación con el panorama de amenazas.", "Permite actualización anticipada ante cambios tecnológicos."]}, {"ref": "I4", "name": "Estímulos fiscales", "tier": "Avanzado", "src": "Maryland; Trinidad y Tobago (2024)", "items": ["Los habilita como herramienta focalizada (PYMES/sectores).", "Exige verificabilidad (gastos elegibles, proveedores certificados).", "Los hace temporales/revisables (sunset), no subsidio permanente."]}]}, {"id": "J", "name": "Responsabilidades y sanciones", "core": "Ejecutar sin desalentar el reporte responsable.", "subs": [{"ref": "J1", "name": "Anti-SLAPP / buena fe", "tier": "Intermedio", "src": "DOJ 9-48.000; NIS2 arts. 23, 30; Dir. (UE) 2024/1069; Dir. 2019/1937", "items": ["Define operativamente la buena fe (investigar/probar/corregir sin causar daño).", "Evita el agravamiento de responsabilidad por el solo hecho de reportar.", "Blinda procesalmente frente a demandas abusivas (cese anticipado, costas)."]}, {"ref": "J2", "name": "Escalera de cumplimiento", "tier": "Núcleo", "src": "NIS2 arts. 32, 34; DORA art. 51; Chile art. 40", "items": ["Prevé un catálogo gradual (advertir → ordenar → corregir → sancionar → restringir).", "Fija criterios objetivos de graduación (intencionalidad, gravedad, cooperación...).", "Intensifica cuando el incumplimiento persiste o afecta a actores sensibles."]}, {"ref": "J3", "name": "Procedimiento sancionador y apelación", "tier": "Núcleo", "src": "NIS2 art. 32(7); Chile arts. 37, 41-43, 46", "items": ["Identifica la autoridad competente y el reparto (evita doble punición / non bis in idem).", "Garantiza cargos fundados, plazo de descargos y resolución motivada.", "Prevé recursos ante instancia independiente y cautelares proporcionales."]}, {"ref": "J4", "name": "Publicidad proporcional", "tier": "Intermedio", "src": "DORA art. 54; NIS2 art. 32(4)(h); SEC 8-K (ref. comparada)", "items": ["Calibra la publicidad caso por caso (diferir/anonimizar/abstenerse).", "Distingue publicidad administrativa de divulgación obligatoria al mercado.", "Coordina con regímenes sectoriales para evitar duplicidad/revictimización."]}]}]}</script>
<script>
const APP = JSON.parse(document.getElementById('data').textContent);
const SCALE = APP.scale;
const NCOL = ['var(--n0)','var(--n1)','var(--n2)','var(--n3)','var(--n4)'];
const SUBS = []; APP.pillars.forEach(p=>p.subs.forEach(s=>{s.pid=p.id;SUBS.push(s);}));
const NSUB = SUBS.length;
const KEY = 'autoeval_ciber_alc_v2';

let state = {}; // id -> {n, ev, no}
function load(){ try{const r=localStorage.getItem(KEY); if(r) state=JSON.parse(r);}catch(e){} }
function save(){ try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){} }
function cell(ref,i){ const id=ref+'-'+i; if(!state[id]) state[id]={n:0,ev:'',no:''}; return state[id]; }

function subAvg(s){ let t=0; for(let i=0;i<s.items.length;i++) t+=cell(s.ref,i).n; return t/s.items.length; }
function pillarAvg(p){ let t=0; p.subs.forEach(s=>t+=subAvg(s)); return p.subs.length?t/p.subs.length:0; }
function labelFor(avg){ const r=Math.round(avg); return (SCALE.find(x=>x.n===r)||{}).label||''; }
function prioFor(s){ const a=subAvg(s); if(a>=3) return ['enley','En ley'];
 if(s.tier==='Núcleo') return ['ALTA','Alta']; if(s.tier==='Intermedio') return ['MEDIA','Media']; return ['BAJA','Baja']; }

let active = APP.pillars[0].id;
let filterTier='', onlyGap=false, q='';

/* ---- summary + radar ---- */
function metrics(){
 let sum=0,cov=0,ops=0,gap=0;
 SUBS.forEach(s=>{const a=subAvg(s); sum+=a; if(a>=3)cov++; if(a>=3.999)ops++; if(s.tier==='Núcleo'&&a<3)gap++;});
 return {avg:sum/NSUB, cov:cov/NSUB, ops:ops/NSUB, gap};
}
function fmtAvg(v){ const c=NCOL[Math.max(0,Math.min(4,Math.round(v)))]; return `${v.toFixed(2)} <small style="color:${c}">●</small>`; }

let radarCur = APP.pillars.map(()=>0);
function drawRadar(target){
 const svg=document.getElementById('radar'); const cx=100,cy=82,R=62,N=APP.pillars.length;
 const ang=k=>(-Math.PI/2)+k*2*Math.PI/N;
 const pt=(k,val)=>[cx+Math.cos(ang(k))*R*val/4, cy+Math.sin(ang(k))*R*val/4];
 let g='';
 for(let ring=1;ring<=4;ring++){ let d=''; for(let k=0;k<N;k++){const[x,y]=pt(k,ring); d+=(k?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' ';}
  g+=`<path d="${d}Z" fill="none" stroke="#33507a" stroke-width="${ring===4?1.1:.6}"/>`; }
 for(let k=0;k<N;k++){const[x,y]=pt(k,4); g+=`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#33507a" stroke-width=".6"/>`;
  const[lx,ly]=pt(k,4.55); g+=`<text x="${lx.toFixed(1)}" y="${(ly+3).toFixed(1)}" fill="#cdd9e6" font-size="9" font-weight="700" text-anchor="middle">${APP.pillars[k].id}</text>`; }
 let d=''; for(let k=0;k<N;k++){const[x,y]=pt(k,target[k]); d+=(k?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' ';}
 g+=`<path d="${d}Z" fill="rgba(200,162,75,.35)" stroke="${'#C8A24B'}" stroke-width="2"/>`;
 for(let k=0;k<N;k++){const[x,y]=pt(k,target[k]); g+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.2" fill="#C8A24B"/>`;}
 svg.innerHTML=g;
}
function updateRadar(){
 const tgt=APP.pillars.map(p=>pillarAvg(p));
 const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
 if(reduce){radarCur=tgt;drawRadar(tgt);return;}
 const from=radarCur.slice(); const t0=performance.now();
 function step(t){ const k=Math.min(1,(t-t0)/240); const cur=from.map((f,i)=>f+(tgt[i]-f)*k); drawRadar(cur);
  if(k<1) requestAnimationFrame(step); else radarCur=tgt; }
 requestAnimationFrame(step);
}
function updateSummary(){
 const m=metrics();
 document.getElementById('kAvg').innerHTML=fmtAvg(m.avg);
 document.getElementById('kCov').textContent=Math.round(m.cov*100)+'%';
 document.getElementById('kOps').textContent=Math.round(m.ops*100)+'%';
 document.getElementById('kGap').textContent=m.gap;
 updateRadar();
}

/* ---- nav ---- */
function renderNav(){
 const el=document.getElementById('pnav'); el.innerHTML='';
 APP.pillars.forEach(p=>{
  const a=pillarAvg(p), col=NCOL[Math.round(a)];
  const b=document.createElement('button'); b.className='pnav-b'+(p.id===active?' active':''); b.dataset.id=p.id;
  if(p.id===active) b.classList.add('active');
  b.innerHTML=`<span class="dot">${p.id}</span><span class="pm"><span class="nm">${p.name}</span>
   <span class="bar"><i style="width:${a/4*100}%;background:${col}"></i></span></span><span class="av">${a.toFixed(1)}</span>`;
  b.onclick=()=>{active=p.id;renderNav();renderContent();window.scrollTo({top:0,behavior:'smooth'});};
  el.appendChild(b);
 });
}

/* ---- content ---- */
function matchFilter(s){
 if(filterTier && s.tier!==filterTier) return false;
 if(onlyGap && !(s.tier==='Núcleo'&&subAvg(s)<3)) return false;
 if(q){ const hay=(s.ref+' '+s.name+' '+s.items.join(' ')).toLowerCase(); if(!hay.includes(q)) return false; }
 return true;
}
function renderContent(){
 const p=APP.pillars.find(x=>x.id===active);
 const c=document.getElementById('content');
 c.innerHTML=`
  <div class="phead"><div class="big">${p.id}</div><div><h2>${p.name}</h2><div class="core">${p.core}</div></div></div>
  <div class="legend"><h3>Escala de madurez</h3>${SCALE.map(s=>`<div class="row"><span class="lv" style="background:${NCOL[s.n]}">${s.n}</span><div><b>${s.label}.</b> ${s.desc}</div></div>`).join('')}
   <div class="notes"><b>Lectura:</b> nivel ≥ 3 = ya está en una ley especial (cobertura legal); nivel 4 = además verificable (madurez operativa). El nivel del subpilar es el <b>promedio</b> de sus 3 ítems.</div></div>
  <div class="tools">
   <input type="search" id="q" placeholder="Buscar en este pilar…" value="${q.replace(/"/g,'&quot;')}">
   <select id="ftier"><option value="">Todos los tiers</option><option>Núcleo</option><option>Intermedio</option><option>Avanzado</option></select>
   <label class="chk"><input type="checkbox" id="fgap"> Solo brechas Núcleo abiertas</label>
  </div>
  <div id="cards"></div>`;
 const sel=c.querySelector('#ftier'); sel.value=filterTier;
 c.querySelector('#fgap').checked=onlyGap;
 c.querySelector('#q').oninput=e=>{q=e.target.value.toLowerCase();renderCards();};
 sel.onchange=e=>{filterTier=e.target.value;renderCards();};
 c.querySelector('#fgap').onchange=e=>{onlyGap=e.target.checked;renderCards();};
 renderCards();
}
function renderCards(){
 const p=APP.pillars.find(x=>x.id===active);
 const box=document.getElementById('cards'); box.innerHTML='';
 let shown=0;
 p.subs.forEach(s=>{
  if(!matchFilter(s)) return; shown++;
  const card=document.createElement('div'); card.className='card'; card.dataset.ref=s.ref;
  const a=subAvg(s),[pc,pl]=prioFor(s);
  card.innerHTML=`
   <div class="sc"><span class="ref">${s.ref}</span><span class="nm">${s.name}</span>
    <span class="tier ${s.tier}">${s.tier}</span>
    <span class="scmeta"><span class="lvlchip" data-lvl>${a.toFixed(1)} · ${labelFor(a)}</span><span class="prio ${pc}" data-prio>${pl}</span></span></div>
   <div class="src"><b>Referencia comparada:</b> ${s.src}</div>
   ${s.items.map((it,i)=>{const cl=cell(s.ref,i);return `
    <div class="item">
     <div class="q">• ${it}</div>
     <div class="seg" role="group" aria-label="Nivel para ${s.ref} ítem ${i+1}">
      ${[0,1,2,3,4].map(n=>`<button data-r="${s.ref}" data-i="${i}" data-n="${n}" class="${cl.n===n?'on'+n:''}">${n}</button>`).join('')}
     </div>
     <div class="fields">
      <div><label>Evidencia (art./sección de su ley)</label><textarea data-r="${s.ref}" data-i="${i}" data-f="ev">${(cl.ev||'').replace(/</g,'&lt;')}</textarea></div>
      <div><label>Nota / acción</label><textarea data-r="${s.ref}" data-i="${i}" data-f="no">${(cl.no||'').replace(/</g,'&lt;')}</textarea></div>
     </div>
    </div>`;}).join('')}`;
  box.appendChild(card);
 });
 if(!shown) box.innerHTML='<div class="notes" style="padding:18px">Ningún subpilar coincide con el filtro. Ajusta la búsqueda o quita el filtro de brechas.</div>';
 box.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>setLevel(b));
 box.querySelectorAll('textarea').forEach(t=>t.oninput=()=>{const c=cell(t.dataset.r,+t.dataset.i);c[t.dataset.f]=t.value;debouncedSave();});
}
function refreshCard(ref){
 const card=document.querySelector(`.card[data-ref="${ref}"]`); if(!card) return;
 const s=SUBS.find(x=>x.ref===ref); const a=subAvg(s),[pc,pl]=prioFor(s);
 card.querySelector('[data-lvl]').textContent=`${a.toFixed(1)} · ${labelFor(a)}`;
 const pr=card.querySelector('[data-prio]'); pr.className='prio '+pc; pr.textContent=pl;
}
function setLevel(btn){
 const ref=btn.dataset.r,i=+btn.dataset.i,n=+btn.dataset.n;
 cell(ref,i).n=n;
 const seg=btn.parentElement; seg.querySelectorAll('button').forEach(x=>x.className='');
 btn.className='on'+n;
 refreshCard(ref); renderNav(); updateSummary(); debouncedSave();
}

let saveT; function debouncedSave(){ clearTimeout(saveT); saveT=setTimeout(save,400); }

/* ---- export / import ---- */
function download(name,text,type){ const b=new Blob([text],{type}); const u=URL.createObjectURL(b);
 const a=document.createElement('a'); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }
function tstamp(){ return new Date().toISOString().slice(0,10); }
document.getElementById('bExport').onclick=()=>download(`autoevaluacion_ciber_${tstamp()}.json`,JSON.stringify({version:2,saved:new Date().toISOString(),state},null,2),'application/json');
document.getElementById('bImport').onclick=()=>document.getElementById('fImport').click();
document.getElementById('fImport').onchange=e=>{const f=e.target.files[0]; if(!f)return; const r=new FileReader();
 r.onload=()=>{try{const o=JSON.parse(r.result); state=o.state||o; save(); renderNav(); renderContent(); updateSummary();}catch(err){alert('Archivo no válido.');}}; r.readAsText(f);};
document.getElementById('bCsv').onclick=()=>{
 const rows=[['Pilar','Ref','Subpilar','Tier','Item_n','Item','Nivel','Etiqueta','Evidencia','Nota','Nivel_subpilar','En_ley','Prioridad','Referencia']];
 APP.pillars.forEach(p=>p.subs.forEach(s=>{const a=subAvg(s),[pc,pl]=prioFor(s);
  s.items.forEach((it,i)=>{const c=cell(s.ref,i);
   rows.push([p.id,s.ref,s.name,s.tier,i+1,it,c.n,labelFor(c.n),c.ev||'',c.no||'',a.toFixed(2),a>=3?'Sí':'No',pl,s.src]);});}));
 const csv=rows.map(r=>r.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(',')).join('\r\n');
 download(`autoevaluacion_ciber_${tstamp()}.csv`,'\uFEFF'+csv,'text/csv');
};
document.getElementById('bPrint').onclick=()=>window.print();
document.getElementById('bReset').onclick=()=>{ if(confirm('Esto borra todos los niveles, evidencias y notas. ¿Continuar?')){ state={}; save(); renderNav(); renderContent(); updateSummary(); } };

/* ---- init ---- */
load(); renderNav(); renderContent(); updateSummary();
</script>
</body>
</html>
